name = "contrib-trends"
main = "src/index.ts"
compatibility_date = "2025-03-15"

# Serve static files from site/ directory
assets = { directory = "./site", binding = "ASSETS" }

# Custom domain (auto-managed DNS record)
[[routes]]
pattern = "codewar.dev"
custom_domain = true

# The GITHUB_TOKEN secret is set via: npx wrangler secret put GITHUB_TOKEN

[[kv_namespaces]]
binding = "CACHE"
id = "d9ed367a98744eeaa7c33e73c63bcc58"
