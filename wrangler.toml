name = "contrib-trends"
main = "src/index.ts"
compatibility_date = "2025-03-15"

# Serve static files from site/ directory
# run_worker_first ensures Worker handles all requests (needed for dynamic OG tags)
[assets]
directory = "./site"
binding = "ASSETS"
run_worker_first = true

# Custom domain (auto-managed DNS record)
[[routes]]
pattern = "codewar.dev"
custom_domain = true

# The GITHUB_TOKEN secret is set via: npx wrangler secret put GITHUB_TOKEN

[[kv_namespaces]]
binding = "CACHE"
id = "d9ed367a98744eeaa7c33e73c63bcc58"
